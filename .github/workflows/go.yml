name: Build and Release exe

on:
  push:
    tags:
      - "v*" # v1.0 などのタグを打つとリリース作成
    branches:
      - main # mainにプッシュするたびに最新版をビルド（テスト用）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows exe
        run: |
          go mod init cs-strip || true
          # Windows向けにクロスコンパイル
          GOOS=windows GOARCH=amd64 go build -o cs-strip.exe main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs-strip-windows
          path: cs-strip.exe

      # リリース作成（タグを打った時のみ実行）
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cs-strip.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
